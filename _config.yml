# ═════════════════════════════════════════════════════════════════════════════
# SEARCH CONFIGURATION
# ═════════════════════════════════════════════════════════════════════════════
search:
  enabled: true
  placeholder:
    en: "Search documentation..."
    zh: "搜索文档..."
  empty:
    en: "No results found"
    zh: "未找到结果"

# ═════════════════════════════════════════════════════════════════════════════
# EXCLUDE & INCLUDE
# ═════════════════════════════════════════════════════════════════════════════
exclude:
  # Build artifacts
  - .git
  - .gitignore
  - .github
  - .vscode
  - .ruff_cache
  - .clang-format
  - .editorconfig

  # Source code
  - include
  - src
  - python
  - tests
  - benchmarks
  - build
  - cmake-build-*
  - __pycache__
  - "*.egg-info"
  - vendor

  # Build files
  - CMakeLists.txt
  - CMakePresets.json
  - pyproject.toml
  - setup.py
  - requirements.txt
  - Gemfile
  - Gemfile.lock

  # Source files
  - "*.cu"
  - "*.cuh"
  - "*.cpp"
  - "*.h"
  - "*.o"
  - "*.so"
  - "*.pyc"

# Explicitly include directories needed for the site
include:
  - _layouts
  - _includes
  - assets
  - specs
  - docs

# ═════════════════════════════════════════════════════════════════════════════
# PERFORMANCE SETTINGS
# ═════════════════════════════════════════════════════════════════════════════
incremental: false
safe: false
lsi: false
highlighter: rouge
gist:
  noscript: false

# ═════════════════════════════════════════════════════════════════════════════
# CUSTOM VARIABLES
# ═════════════════════════════════════════════════════════════════════════════
google_analytics: 

# Version
current_version: 0.3.0

# Latest release
github:
  repository_url: https://github.com/LessUp/llm-speed
  releases_url: https://github.com/LessUp/llm-speed/releases
  issues_url: https://github.com/LessUp/llm-speed/issues
