title: LLM-Speed
description: >-
  CUDA LLM Kernel Optimization Library — FlashAttention, Tensor Core GEMM,
  Python bindings with pybind11, and property-based testing with Hypothesis
remote_theme: null
plugins:
  - jekyll-seo-tag
repository: LessUp/llm-speed
show_downloads: false

# Site URL configuration
url: https://lessup.github.io
baseurl: /llm-speed
lang: en
author: LessUp

# Markdown configuration
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false

# Default layout for all pages
defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      path: "changelog"
    values:
      layout: default
  - scope:
      path: "docs"
    values:
      layout: default

# Exclude build artifacts and source files from Jekyll
exclude:
  - .git
  - .github
  - .kiro
  - .vscode
  - .ruff_cache
  - include
  - src
  - python
  - tests
  - benchmarks
  - build
  - cmake-build-*
  - __pycache__
  - "*.egg-info"
  - CMakeLists.txt
  - CMakePresets.json
  - pyproject.toml
  - setup.py
  - requirements.txt
  - .clang-format
  - .editorconfig
  - .gitignore
  - Gemfile
  - Gemfile.lock
  - vendor
  - "*.cu"
  - "*.cuh"
  - "*.cpp"
  - "*.h"
  - "*.o"
  - "*.so"

# Include these files explicitly
include:
  - _layouts

# SEO and social media
twitter:
  username: nvidia
  card: summary

social:
  name: NVIDIA CUDA
  links:
    - https://developer.nvidia.com/cuda-toolkit

# Navigation (for custom use)
navigation:
  - name: Home
    url: /
  - name: Guide
    url: /docs/deepwiki
  - name: API
    url: /docs/api
  - name: Performance
    url: /docs/performance
  - name: Changelog
    url: /changelog/
  - name: GitHub
    url: https://github.com/LessUp/llm-speed
    external: true
