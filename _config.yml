# ═════════════════════════════════════════════════════════════════════════════
# LLM-Speed GitHub Pages Configuration - Premium Edition
# ═════════════════════════════════════════════════════════════════════════════

title: "LLM-Speed"
description: >-
  High-performance CUDA kernel library for LLM inference — FlashAttention with O(N) memory,
  Tensor Core GEMM acceleration, and seamless PyTorch integration

# Repository Info
repository: LessUp/llm-speed
show_downloads: true

# ═════════════════════════════════════════════════════════════════════════════
# SITE CONFIGURATION
# ═════════════════════════════════════════════════════════════════════════════
url: https://lessup.github.io
baseurl: /llm-speed
lang: en

# Author & Social
author:
  name: LessUp
  email: 
  twitter: 
  github: LessUp

# Social Links
social:
  name: LLM-Speed
  links:
    - https://github.com/LessUp/llm-speed
    - https://lessup.github.io/llm-speed

# Twitter Card
twitter:
  username: 
  card: summary_large_image

# ═════════════════════════════════════════════════════════════════════════════
# THEME & PLUGINS - POWERED BY JEKYLL
# ═════════════════════════════════════════════════════════════════════════════
remote_theme: null

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-last-modified-at

# SEO Settings
seo:
  type: SoftwareApplication
  name: LLM-Speed
  application:
    category: DeveloperApplication
    operating_system: Linux
    price: 0
    price_currency: USD

# ═════════════════════════════════════════════════════════════════════════════
# MARKDOWN PROCESSING
# ═════════════════════════════════════════════════════════════════════════════
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: true
      line_numbers_start: 1
      wrap: false
    css_class: 'highlight'
    span:
      line_numbers: false

# ═════════════════════════════════════════════════════════════════════════════
# DEFAULT LAYOUTS BY PATH
# ═════════════════════════════════════════════════════════════════════════════
defaults:
  # Root pages
  - scope:
      path: ""
      type: pages
    values:
      layout: default
      lang: en

  # Setup guides
  - scope:
      path: "docs/setup"
    values:
      layout: docs
      nav_section: setup

  # Tutorials and guides
  - scope:
      path: "docs/tutorials"
    values:
      layout: docs
      nav_section: tutorials

  # Architecture docs
  - scope:
      path: "docs/architecture"
    values:
      layout: docs
      nav_section: architecture

  # API docs
  - scope:
      path: "docs/api"
    values:
      layout: docs
      nav_section: api

  # Docs index
  - scope:
      path: "docs/README.md"
    values:
      layout: default
      lang: en

  # Specs
  - scope:
      path: "specs"
    values:
      layout: page
      nav_section: specs

  # Changelog
  - scope:
      path: "docs/changelog"
    values:
      layout: page
      nav_section: changelog

# ═════════════════════════════════════════════════════════════════════════════
# NAVIGATION STRUCTURE
# ═════════════════════════════════════════════════════════════════════════════
navigation:
  - name: Home
    url: /
    icon: 🏠
  - name: Quick Start
    url: /docs/setup/quickstart-en
    icon: 🚀
  - name: Documentation
    url: /docs/
    icon: 📚
    submenu:
      - name: Setup Guides
        url: /docs/
      - name: Tutorials
        url: /docs/
      - name: Architecture
        url: /docs/
      - name: API Reference
        url: /docs/
  - name: Specifications
    url: /specs/
    icon: 📋
    submenu:
      - name: Product Requirements
        url: /specs/product/cuda-llm-kernel-optimization.md
      - name: Core Architecture RFC
        url: /specs/rfc/0001-core-architecture.md
      - name: Implementation Tasks RFC
        url: /specs/rfc/0002-implementation-tasks.md
  - name: Changelog
    url: /CHANGELOG.md
    icon: 📝
  - name: GitHub
    url: https://github.com/LessUp/llm-speed
    icon: 💻
    external: true

# ═════════════════════════════════════════════════════════════════════════════
# DOC SECTIONS FOR SIDEBAR
# ═════════════════════════════════════════════════════════════════════════════
doc_sections:
  - title: Setup Guides
    items:
      - name: Quick Start (English)
        url: /docs/setup/quickstart-en
      - name: 快速入门 (中文)
        url: /docs/setup/quickstart-zh
  - title: Tutorials & Guides
    items:
      - name: Performance Guide
        url: /docs/tutorials/performance-en
      - name: Troubleshooting
        url: /docs/tutorials/troubleshooting-en
  - title: Architecture
    items:
      - name: Architecture Deep Dive
        url: /docs/architecture/architecture-en
  - title: API Reference
    items:
      - name: API Reference
        url: /docs/api/api-en
  - title: Specifications
    items:
      - name: Product Requirements
        url: /specs/product/cuda-llm-kernel-optimization.md
      - name: Core Architecture RFC
        url: /specs/rfc/0001-core-architecture.md
      - name: Implementation Tasks RFC
        url: /specs/rfc/0002-implementation-tasks.md

# ═════════════════════════════════════════════════════════════════════════════
# SEARCH CONFIGURATION
# ═════════════════════════════════════════════════════════════════════════════
search:
  enabled: true
  placeholder:
    en: "Search documentation..."
    zh: "搜索文档..."
  empty:
    en: "No results found"
    zh: "未找到结果"

# ═════════════════════════════════════════════════════════════════════════════
# EXCLUDE & INCLUDE
# ═════════════════════════════════════════════════════════════════════════════
exclude:
  # Build artifacts
  - .git
  - .gitignore
  - .github
  - .vscode
  - .ruff_cache
  - .clang-format
  - .editorconfig

  # Source code
  - include
  - src
  - python
  - tests
  - benchmarks
  - build
  - cmake-build-*
  - __pycache__
  - "*.egg-info"
  - vendor

  # Build files
  - CMakeLists.txt
  - CMakePresets.json
  - pyproject.toml
  - setup.py
  - requirements.txt
  - Gemfile
  - Gemfile.lock

  # Source files
  - "*.cu"
  - "*.cuh"
  - "*.cpp"
  - "*.h"
  - "*.o"
  - "*.so"
  - "*.pyc"

include:
  - _layouts
  - _includes
  - _sass
  - assets
  - specs
  - docs
  - CHANGELOG.md

# ═════════════════════════════════════════════════════════════════════════════
# PERFORMANCE SETTINGS
# ═════════════════════════════════════════════════════════════════════════════
incremental: false
safe: false
lsi: false
highlighter: rouge
gist:
  noscript: false

# ═════════════════════════════════════════════════════════════════════════════
# CUSTOM VARIABLES
# ═════════════════════════════════════════════════════════════════════════════
google_analytics: 

# Version
current_version: 0.3.0

# Latest release
github:
  repository_url: https://github.com/LessUp/llm-speed
  releases_url: https://github.com/LessUp/llm-speed/releases
  issues_url: https://github.com/LessUp/llm-speed/issues
