title: "LLM-Speed"
description: >-
  CUDA kernels for LLM inference: FlashAttention forward, Tensor Core GEMM,
  PyTorch bindings, and a compact optimization playground.
repository: LessUp/llm-speed
url: "https://lessup.github.io"
baseurl: "/llm-speed"
lang: en
permalink: pretty

author:
  name: LessUp
  github: LessUp

social:
  name: LLM-Speed
  links:
    - https://github.com/LessUp/llm-speed
    - https://lessup.github.io/llm-speed

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: default
      lang: en
  - scope:
      path: "docs/setup"
    values:
      layout: docs
  - scope:
      path: "docs/tutorials"
    values:
      layout: docs
  - scope:
      path: "docs/architecture"
    values:
      layout: docs
  - scope:
      path: "docs/api"
    values:
      layout: docs
  - scope:
      path: "docs/README.md"
    values:
      layout: default
      lang: en

navigation:
  en:
    - name: Home
      url: /
      icon: 🏠
    - name: Quick Start
      url: /docs/setup/quickstart-en/
      icon: 🚀
    - name: API
      url: /docs/api/api-en/
      icon: 🧩
    - name: Architecture
      url: /docs/architecture/architecture-en/
      icon: 🏗️
    - name: Performance
      url: /docs/tutorials/performance-en/
      icon: 📈
    - name: GitHub
      url: https://github.com/LessUp/llm-speed
      icon: 💻
      external: true
  zh-CN:
    - name: 首页
      url: /
      icon: 🏠
    - name: 快速开始
      url: /docs/setup/quickstart-zh/
      icon: 🚀
    - name: API
      url: /docs/api/api-zh/
      icon: 🧩
    - name: 架构
      url: /docs/architecture/architecture-zh/
      icon: 🏗️
    - name: 性能
      url: /docs/tutorials/performance-zh/
      icon: 📈
    - name: GitHub
      url: https://github.com/LessUp/llm-speed
      icon: 💻
      external: true

doc_sections:
  en:
    - title: Getting Started
      items:
        - name: Docs Overview
          url: /docs/
        - name: Quick Start
          url: /docs/setup/quickstart-en/
    - title: Reference
      items:
        - name: API Reference
          url: /docs/api/api-en/
        - name: Architecture
          url: /docs/architecture/architecture-en/
    - title: Guides
      items:
        - name: Performance Guide
          url: /docs/tutorials/performance-en/
        - name: Troubleshooting
          url: /docs/tutorials/troubleshooting-en/
  zh-CN:
    - title: 开始
      items:
        - name: 文档总览
          url: /docs/
        - name: 快速开始
          url: /docs/setup/quickstart-zh/
    - title: 参考
      items:
        - name: API 参考
          url: /docs/api/api-zh/
        - name: 架构设计
          url: /docs/architecture/architecture-zh/
    - title: 指南
      items:
        - name: 性能指南
          url: /docs/tutorials/performance-zh/
        - name: 故障排除
          url: /docs/tutorials/troubleshooting-zh/

exclude:
  - .git
  - .github
  - .venv
  - .ruff_cache
  - .pre-commit-cache
  - __pycache__
  - include
  - src
  - tests
  - benchmarks
  - openspec
  - build
  - build-*
  - cmake-build-*
  - "*.egg-info"
  - "*.cu"
  - "*.cuh"
  - "*.cpp"
  - "*.h"
  - "*.so"
  - CMakeLists.txt
  - CMakePresets.json
  - pyproject.toml
  - setup.py
  - requirements.txt
  - pyrightconfig.json
  - .clangd

include:
  - _layouts
  - assets
  - docs

current_version: 0.3.0

github:
  repository_url: https://github.com/LessUp/llm-speed
  releases_url: https://github.com/LessUp/llm-speed/releases
  issues_url: https://github.com/LessUp/llm-speed/issues
