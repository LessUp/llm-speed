# ═════════════════════════════════════════════════════════════════════════════
# LLM-Speed GitHub Pages Configuration
# ═════════════════════════════════════════════════════════════════════════════

title: "LLM-Speed"
description: >-
  High-performance CUDA kernel library for LLM inference — FlashAttention with O(N) memory,
  Tensor Core GEMM acceleration, and seamless PyTorch integration

# Repository Info
repository: LessUp/llm-speed
show_downloads: true

# ═════════════════════════════════════════════════════════════════════════════
# SITE CONFIGURATION
# ═════════════════════════════════════════════════════════════════════════════
url: "https://lessup.github.io"
baseurl: "/llm-speed"
lang: en

# Use pretty URLs (no .html extension)
permalink: pretty

# Author & Social
author:
  name: LessUp
  email: 
  twitter: 
  github: LessUp

# Social Links
social:
  name: LLM-Speed
  links:
    - https://github.com/LessUp/llm-speed
    - https://lessup.github.io/llm-speed

# Twitter Card
twitter:
  username: 
  card: summary_large_image

# ═════════════════════════════════════════════════════════════════════════════
# THEME & PLUGINS - POWERED BY JEKYLL
# ═════════════════════════════════════════════════════════════════════════════

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-last-modified-at

# Note: This site uses a custom theme via _layouts/ and assets/css/
# No remote_theme or theme specified - using GitHub Pages' default

# SEO Settings
seo:
  type: SoftwareApplication
  name: LLM-Speed
  application:
    category: DeveloperApplication
    operating_system: Linux
    price: 0
    price_currency: USD

# ═════════════════════════════════════════════════════════════════════════════
# MARKDOWN PROCESSING
# ═════════════════════════════════════════════════════════════════════════════
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: true
      line_numbers_start: 1
      wrap: false
    css_class: 'highlight'
    span:
      line_numbers: false

# ═════════════════════════════════════════════════════════════════════════════
# DEFAULT LAYOUTS BY PATH
# ═════════════════════════════════════════════════════════════════════════════
defaults:
  # Root pages
  - scope:
      path: ""
      type: pages
    values:
      layout: default
      lang: en

  # Setup guides
  - scope:
      path: "docs/setup"
    values:
      layout: docs
      nav_section: setup

  # Tutorials and guides
  - scope:
      path: "docs/tutorials"
    values:
      layout: docs
      nav_section: tutorials

  # Architecture docs
  - scope:
      path: "docs/architecture"
    values:
      layout: docs
      nav_section: architecture

  # API docs
  - scope:
      path: "docs/api"
    values:
      layout: docs
      nav_section: api

  # Docs index
  - scope:
      path: "docs/README.md"
    values:
      layout: default
      lang: en

  # Specs
  - scope:
      path: "specs"
    values:
      layout: page
      nav_section: specs

  # Changelog
  - scope:
      path: "docs/changelog"
    values:
      layout: page
      nav_section: changelog

# ═════════════════════════════════════════════════════════════════════════════
