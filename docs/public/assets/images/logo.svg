<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <!-- Main gradient - NVIDIA CUDA Green -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8fd600;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#76b900;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5a8f00;stop-opacity:1" />
    </linearGradient>

    <!-- Metallic highlight -->
    <linearGradient id="highlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.2" />
    </linearGradient>

    <!-- Chip circuit pattern -->
    <pattern id="circuit" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="transparent"/>
      <path d="M0 4h3M5 4h3M4 0v3M4 5v3" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.15"/>
      <circle cx="4" cy="4" r="1" fill="#ffffff" fill-opacity="0.1"/>
    </pattern>

    <!-- Shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background circle with shadow -->
  <circle cx="60" cy="60" r="54" fill="url(#mainGrad)" filter="url(#shadow)"/>

  <!-- Circuit pattern overlay -->
  <circle cx="60" cy="60" r="54" fill="url(#circuit)"/>

  <!-- Metallic highlight overlay -->
  <circle cx="60" cy="60" r="54" fill="url(#highlight)"/>

  <!-- GPU chip border ring -->
  <circle cx="60" cy="60" r="48" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.2"/>
  <circle cx="60" cy="60" r="42" fill="none" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.1"/>

  <!-- Lightning bolt - represents speed/attention -->
  <path d="M45 68 L55 48 L55 58 L65 58 L55 78 L55 68 Z"
        fill="#ffffff"
        stroke="#000000"
        stroke-width="0.5"
        stroke-opacity="0.1"/>

  <!-- Small GPU cores pattern -->
  <g fill="#ffffff" fill-opacity="0.8">
    <!-- Top cores -->
    <rect x="52" y="28" width="4" height="4" rx="0.5"/>
    <rect x="60" y="28" width="4" height="4" rx="0.5"/>
    <rect x="68" y="28" width="4" height="4" rx="0.5"/>
    <!-- Bottom cores -->
    <rect x="52" y="88" width="4" height="4" rx="0.5"/>
    <rect x="60" y="88" width="4" height="4" rx="0.5"/>
    <rect x="68" y="88" width="4" height="4" rx="0.5"/>
    <!-- Side cores -->
    <rect x="28" y="52" width="4" height="4" rx="0.5"/>
    <rect x="28" y="60" width="4" height="4" rx="0.5"/>
    <rect x="28" y="68" width="4" height="4" rx="0.5"/>
    <rect x="88" y="52" width="4" height="4" rx="0.5"/>
    <rect x="88" y="60" width="4" height="4" rx="0.5"/>
    <rect x="88" y="68" width="4" height="4" rx="0.5"/>
  </g>

  <!-- LLM text -->
  <text x="60" y="102"
        font-family="'SF Pro Display', -apple-system, 'Segoe UI', Arial, sans-serif"
        font-size="11"
        font-weight="700"
        text-anchor="middle"
        fill="#ffffff"
        letter-spacing="2">LLM</text>
</svg>
