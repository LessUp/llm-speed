<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ page.description | default: site.description }}">
    <meta name="author" content="{{ site.author }}">
    <meta name="generator" content="Jekyll v{{ jekyll.version }}">

    {% if page.title %}
    <title>{{ page.title }} | {{ site.title }}</title>
    {% else %}
    <title>{{ site.title }}</title>
    {% endif %}

    <!-- Open Graph / Social Media -->
    <meta property="og:title" content="{{ page.title | default: site.title }}">
    <meta property="og:description" content="{{ page.description | default: site.description }}">
    <meta property="og:url" content="{{ site.url }}{{ site.baseurl }}{{ page.url }}">
    <meta property="og:type" content="website">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="https://www.nvidia.com/favicon.ico">

    <style>
      :root {
        --primary-color: #76b900;
        --text-color: #24292f;
        --bg-color: #ffffff;
        --border-color: #d0d7de;
        --code-bg: #f6f8fa;
        --link-color: #0969da;
      }

      * {
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
        line-height: 1.6;
        color: var(--text-color);
        background-color: var(--bg-color);
        margin: 0;
        padding: 0;
      }

      .container {
        max-width: 960px;
        margin: 0 auto;
        padding: 2rem 1rem;
      }

      header {
        border-bottom: 1px solid var(--border-color);
        padding: 1rem 0;
        margin-bottom: 2rem;
      }

      header .container {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 1rem;
      }

      .site-title {
        font-size: 1.5rem;
        font-weight: 600;
        color: var(--primary-color);
        text-decoration: none;
      }

      .site-title:hover {
        text-decoration: underline;
      }

      nav {
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
      }

      nav a {
        color: var(--text-color);
        text-decoration: none;
        padding: 0.25rem 0.5rem;
        border-radius: 4px;
      }

      nav a:hover {
        background-color: var(--code-bg);
      }

      main {
        min-height: calc(100vh - 200px);
      }

      h1, h2, h3, h4, h5, h6 {
        margin-top: 1.5em;
        margin-bottom: 0.5em;
        font-weight: 600;
        line-height: 1.25;
      }

      h1 { font-size: 2rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem; }
      h2 { font-size: 1.5rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.3rem; }
      h3 { font-size: 1.25rem; }
      h4 { font-size: 1rem; }

      a {
        color: var(--link-color);
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }

      code {
        background-color: var(--code-bg);
        padding: 0.2em 0.4em;
        border-radius: 4px;
        font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, monospace;
        font-size: 0.875em;
      }

      pre {
        background-color: var(--code-bg);
        padding: 1rem;
        border-radius: 6px;
        overflow-x: auto;
        border: 1px solid var(--border-color);
      }

      pre code {
        background: none;
        padding: 0;
        font-size: 0.85rem;
        line-height: 1.5;
      }

      table {
        border-collapse: collapse;
        width: 100%;
        margin: 1rem 0;
      }

      th, td {
        border: 1px solid var(--border-color);
        padding: 0.5rem 0.75rem;
        text-align: left;
      }

      th {
        background-color: var(--code-bg);
        font-weight: 600;
      }

      tr:nth-child(even) {
        background-color: #fafafa;
      }

      blockquote {
        border-left: 4px solid var(--primary-color);
        padding-left: 1rem;
        margin-left: 0;
        color: #57606a;
      }

      hr {
        border: none;
        border-top: 1px solid var(--border-color);
        margin: 2rem 0;
      }

      ul, ol {
        padding-left: 1.5rem;
      }

      li {
        margin: 0.25rem 0;
      }

      img {
        max-width: 100%;
        height: auto;
      }

      footer {
        border-top: 1px solid var(--border-color);
        padding: 1rem 0;
        margin-top: 2rem;
        text-align: center;
        color: #57606a;
        font-size: 0.875rem;
      }

      .badges {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin: 1rem 0;
      }

      .badge img {
        vertical-align: middle;
      }

      @media (max-width: 600px) {
        .container {
          padding: 1rem;
        }

        header .container {
          flex-direction: column;
          align-items: flex-start;
        }

        nav {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="container">
        <a href="{{ site.baseurl }}/" class="site-title">{{ site.title }}</a>
        <nav>
          <a href="{{ site.baseurl }}/">Home</a>
          <a href="{{ site.baseurl }}/docs/deepwiki">Guide</a>
          <a href="{{ site.baseurl }}/docs/api">API</a>
          <a href="{{ site.baseurl }}/docs/performance">Performance</a>
          <a href="{{ site.baseurl }}/changelog/">Changelog</a>
          <a href="https://github.com/LessUp/llm-speed">GitHub</a>
        </nav>
      </div>
    </header>

    <main>
      <div class="container">
        {{ content }}
      </div>
    </main>

    <footer>
      <div class="container">
        <p>
          &copy; {{ 'now' | date: "%Y" }} {{ site.author }}.
          <a href="https://github.com/LessUp/llm-speed">View on GitHub</a>
        </p>
      </div>
    </footer>
  </body>
</html>
