name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-python:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check python/ tests/ benchmarks/

      - name: Ruff format check
        run: ruff format --check python/ tests/ benchmarks/

  test-python:
    name: Python Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install test dependencies
        run: |
          pip install -U pip
          pip install pytest hypothesis
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Check Python sources compile
        run: python -m compileall python tests benchmarks

      - name: Run CPU-safe tests
        run: |
          set +e
          pytest tests/ -v -m "not cuda" --tb=short
          status=$?
          if [ "$status" -eq 5 ]; then
            echo "No CPU-safe tests were collected; treating as success."
            exit 0
          fi
          exit "$status"
