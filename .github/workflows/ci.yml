name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install lint tooling
        run: pip install ruff==0.15.10

      - name: Ruff lint
        run: ruff check cuda_llm_ops/ tests/ benchmarks/

      - name: Ruff format check
        run: ruff format --check cuda_llm_ops/ tests/ benchmarks/

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run security audit
        run: pip-audit --skip-editable -r requirements.txt

  test-cpu:
    name: CPU Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          pip install -U pip
          pip install pytest hypothesis numpy
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Verify Python syntax
        run: python -m compileall cuda_llm_ops tests benchmarks

      - name: Run CPU-safe tests
        run: |
          pytest tests/ -v -m "not cuda" --tb=short || code=$?
          if [ "${code:-0}" -eq 5 ]; then
            echo "No CPU-safe tests collected (exit code 5), treating as success"
            exit 0
          fi
          exit ${code:-0}
