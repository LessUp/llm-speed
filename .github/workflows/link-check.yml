name: Link Check

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'README.md'
  pull_request:
    paths:
      - 'docs/**'
      - 'README.md'
  schedule:
    # Run weekly on Monday at 6 AM UTC
    - cron: '0 6 * * 1'

jobs:
  link-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: |
            --verbose
            --no-progress
            --timeout 30
            --max-retries 3
            --accept 200,429
            --exclude-all-private
            --exclude "https://codecov.io/.*"
            --exclude "https://img.shields.io/.*"
            --exclude "https://colab.research.google.com/.*"
            --exclude "https://lessup.github.io/.*"
            './docs/**/*.md'
            './README.md'
            './README.zh-CN.md'
          fail: true
          output: lychee-report.md

      - name: Upload link check report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: link-check-report
          path: lychee-report.md
